<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tasks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="app-header">
        <h1>My Tasks</h1>
        <p class="subtitle">Stay on top of your day</p>
      </header>

      <!-- Add Task -->
      <div class="input-area">
        <input
          type="text"
          id="taskInput"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="200"
        />
        <button id="addBtn" aria-label="Add task">Add</button>
      </div>

      <!-- Filter Tabs + Counter -->
      <div class="task-meta">
        <div class="filter-tabs" role="tablist" aria-label="Task filters">
          <button class="tab active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="tab" data-filter="pending" role="tab" aria-selected="false">Pending</button>
          <button class="tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        </div>
        <div class="meta-right">
          <span id="taskCounter" class="task-counter">0 tasks left</span>
          <button id="clearCompletedBtn" class="clear-btn" aria-label="Clear completed tasks">
            Clear done
          </button>
        </div>
      </div>

      <!-- Task List -->
      <ul id="taskList" class="task-list" aria-label="Task list" aria-live="polite"></ul>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state" hidden>
        <span class="empty-icon">✓</span>
        <p id="emptyMessage">No tasks yet. Add one above!</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
